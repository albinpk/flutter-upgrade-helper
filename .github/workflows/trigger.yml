on:
    push:
        branches: [dev]
    workflow_dispatch:
        inputs:
            flutter_version:
                description: "Flutter Version"
                required: true
                type: string
permissions:
    contents: write

jobs:
    add_flutter_app:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - run: curl -fsSL https://fvm.app/install.sh | bash
            - name: Git Config
              run: |
                  git config --global user.name 'Albin'
                  git config --global user.email '56157868+albinpk@users.noreply.github.com'
            - name: Generate Project
              #   run: npm run new ${{ inputs.flutter_version }}
              run: npm run new 3.32.0
            - name: Commit & Push
              run: |
                  git add .
                  git commit -m "From action"
                  git push
